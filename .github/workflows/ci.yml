name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parkit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/parkit_test
      CASHCTRL_ORG: test-org
      CASHCTRL_API_KEY: test-key
      CASHCTRL_INVOICE_CATEGORY_ID: "1"
      CASHCTRL_SALES_ACCOUNT_ID: "1"
      CASHCTRL_TAX_ID: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true

      - name: Setup database
        run: bundle exec rails db:schema:load

      - name: Run tests
        run: bundle exec rspec spec/

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v$(date -u +%Y.%m.%d-%H%M)"
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline ${PREV_TAG}..HEAD --no-merges)
          else
            NOTES=$(git log --oneline -20 --no-merges)
          fi
          gh release create "$VERSION" --title "$VERSION" --notes "$NOTES"

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: parkit-bsl
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
